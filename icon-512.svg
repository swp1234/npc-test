<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C9A7"/>
      <stop offset="100%" stop-color="#009E84"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#shine)"/>
  <!-- Pixel character - head -->
  <rect x="196" y="88" width="120" height="32" rx="4" fill="#0a0a14"/>
  <rect x="172" y="120" width="168" height="40" rx="4" fill="#0a0a14"/>
  <!-- Eyes with pupils -->
  <rect x="200" y="128" width="28" height="24" rx="4" fill="#fff"/>
  <rect x="284" y="128" width="28" height="24" rx="4" fill="#fff"/>
  <rect x="210" y="134" width="10" height="12" rx="2" fill="#0a0a14"/>
  <rect x="294" y="134" width="10" height="12" rx="2" fill="#0a0a14"/>
  <!-- Mouth -->
  <rect x="232" y="148" width="48" height="6" rx="3" fill="#0a0a14" opacity="0.4"/>
  <!-- Neck -->
  <rect x="224" y="160" width="64" height="16" rx="4" fill="#0a0a14"/>
  <!-- Body -->
  <rect x="184" y="176" width="144" height="48" rx="6" fill="#0a0a14"/>
  <rect x="168" y="224" width="176" height="40" rx="6" fill="#0a0a14"/>
  <!-- Arms -->
  <rect x="120" y="196" width="48" height="24" rx="6" fill="#0a0a14"/>
  <rect x="344" y="196" width="48" height="24" rx="6" fill="#0a0a14"/>
  <!-- Hands -->
  <rect x="108" y="216" width="28" height="20" rx="6" fill="#0a0a14"/>
  <rect x="376" y="216" width="28" height="20" rx="6" fill="#0a0a14"/>
  <!-- Belt detail -->
  <rect x="192" y="256" width="128" height="8" rx="2" fill="#00C9A7" opacity="0.4"/>
  <!-- Legs -->
  <rect x="192" y="264" width="48" height="56" rx="6" fill="#0a0a14"/>
  <rect x="272" y="264" width="48" height="56" rx="6" fill="#0a0a14"/>
  <!-- Feet -->
  <rect x="184" y="316" width="60" height="16" rx="6" fill="#0a0a14"/>
  <rect x="268" y="316" width="60" height="16" rx="6" fill="#0a0a14"/>
  <!-- Question mark above head -->
  <text x="256" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#fff" opacity="0.95">?</text>
  <!-- NPC label -->
  <text x="256" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#fff" letter-spacing="6">NPC</text>
  <!-- Subtitle -->
  <text x="256" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#fff" opacity="0.7" letter-spacing="4">OR MAIN CHARACTER?</text>
</svg>
