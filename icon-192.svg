<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C9A7"/>
      <stop offset="100%" stop-color="#009E84"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="192" height="192" rx="40" ry="40" fill="url(#bg)"/>
  <!-- Pixel character body -->
  <rect x="76" y="36" width="40" height="12" rx="2" fill="#0a0a14"/>
  <rect x="68" y="48" width="56" height="12" rx="2" fill="#0a0a14"/>
  <!-- Eyes -->
  <rect x="80" y="52" width="8" height="8" rx="1" fill="#fff"/>
  <rect x="104" y="52" width="8" height="8" rx="1" fill="#fff"/>
  <!-- Body -->
  <rect x="72" y="64" width="48" height="12" rx="2" fill="#0a0a14"/>
  <rect x="64" y="76" width="64" height="16" rx="2" fill="#0a0a14"/>
  <!-- Arms -->
  <rect x="48" y="80" width="16" height="8" rx="2" fill="#0a0a14"/>
  <rect x="128" y="80" width="16" height="8" rx="2" fill="#0a0a14"/>
  <!-- Legs -->
  <rect x="72" y="96" width="16" height="20" rx="2" fill="#0a0a14"/>
  <rect x="104" y="96" width="16" height="20" rx="2" fill="#0a0a14"/>
  <!-- Question mark above head -->
  <text x="96" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff">?</text>
  <!-- NPC label -->
  <text x="96" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#fff" letter-spacing="2">NPC</text>
</svg>
