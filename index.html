<main id="main-content">
  <!-- Intro Screen -->
  <section id="intro" class="screen active">
    <div class="glass-card intro-card">
      <div class="npc-icon">
        <svg viewBox="0 0 120 120" width="120" height="120" aria-hidden="true">
          <!-- Pixel art NPC character -->
          <rect x="40" y="10" width="40" height="10" fill="var(--primary)" opacity="0.9"/>
          <rect x="30" y="20" width="60" height="10" fill="var(--primary)" opacity="0.8"/>
          <rect x="30" y="30" width="10" height="10" fill="var(--primary-dark)"/>
          <rect x="50" y="30" width="10" height="10" fill="var(--primary-dark)"/>
          <rect x="80" y="30" width="10" height="10" fill="var(--primary-dark)"/>
          <rect x="40" y="30" width="10" height="10" fill="#fff" opacity="0.9"/>
          <rect x="70" y="30" width="10" height="10" fill="#fff" opacity="0.9"/>
          <rect x="30" y="40" width="60" height="10" fill="var(--primary)" opacity="0.7"/>
          <rect x="45" y="45" width="30" height="5" fill="var(--primary-dark)" opacity="0.6"/>
          <rect x="35" y="55" width="50" height="10" fill="var(--primary)" opacity="0.8"/>
          <rect x="35" y="65" width="50" height="20" fill="var(--primary)" opacity="0.6"/>
          <rect x="35" y="85" width="20" height="15" fill="var(--primary)" opacity="0.5"/>
          <rect x="65" y="85" width="20" height="15" fill="var(--primary)" opacity="0.5"/>
          <!-- Question mark above head -->
          <text x="60" y="8" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--primary-light)" class="npc-question-mark">?</text>
        </svg>
      </div>
      <h1 data-i18n="intro.title">나는 NPC일까, 주인공일까?</h1>
      <p class="subtitle" data-i18n="intro.subtitle">12가지 질문으로 알아보는 당신의 NPC-주인공 스펙트럼</p>
      <button id="startBtn" class="btn-primary" data-i18n="intro.start">테스트 시작</button>
      <p class="question-count" data-i18n="intro.questionCount">12개 질문 · 약 2분 소요</p>
    </div>
  </section>

  <!-- Quiz Screen -->
  <section id="quiz" class="screen">
    <div class="glass-card quiz-card">
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-text" id="progressText">1 / 12</span>
      </div>
      <div class="question-area">
        <h2 class="question-text" id="questionText"></h2>
        <div class="options" id="optionsContainer"></div>
      </div>
    </div>
  </section>

  <!-- Result Screen -->
  <section id="result" class="screen">
    <div class="glass-card result-card">
      <div class="result-reveal" id="resultReveal">
        <div class="npc-meter" id="npcMeter">
          <div class="meter-labels">
            <span class="meter-label-left">🤖 NPC</span>
            <span class="meter-label-right">🔥 BOSS</span>
          </div>
          <div class="meter-track">
            <div class="meter-fill" id="meterFill"></div>
            <div class="meter-indicator" id="meterIndicator"></div>
          </div>
          <div class="meter-score" id="meterScore">0%</div>
        </div>
        <div class="tier-icon" id="tierIcon"></div>
        <h2 class="result-tier-name" id="resultTierName"></h2>
        <p class="result-tagline" id="resultTagline"></p>
        <p class="result-description" id="resultDescription"></p>
        <div class="result-traits" id="resultTraits"></div>
      </div>
      <div class="result-actions">
        <button id="shareBtn" class="btn-primary btn-share" data-i18n="result.share">결과 공유하기</button>
        <button id="retryBtn" class="btn-secondary" data-i18n="result.retry">다시 테스트하기</button>
      </div>
    </div>

    <!-- Cross-promo container -->
    <div id="cross-promo-container"></div>
  </section>
</main>

<!-- Social Share Modal -->

        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        <span>Facebook</span>
      </button>
      <button class="share-btn share-copy" id="shareCopy">
        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>

    </div>
  </div>
