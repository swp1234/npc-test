<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
        {
            "@type": "Question",
            "name": "What is the NPC Test?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "The NPC Test is an RPG-themed personality quiz that determines whether you behave more like an NPC (Non-Player Character) or a Main Character. You react to 10 NPC encounters using dialogue tree choices to discover your RPG role."
            }
        },
        {
            "@type": "Question",
            "name": "What does NPC mean in the NPC Test?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "NPC stands for Non-Player Character, a term from video games referring to characters controlled by the game rather than a player. In internet culture, calling someone an NPC suggests they lack independent thought or follow the crowd without questioning."
            }
        },
        {
            "@type": "Question",
            "name": "How many result types are there in the NPC Test?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "The NPC Test features multiple result tiers ranging from basic NPC roles to powerful Main Character archetypes, including Side Character, Quest Giver, Party Member, and even Final Boss — each with unique descriptions and traits."
            }
        },
        {
            "@type": "Question",
            "name": "Is the NPC Test free to take?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes, the NPC Test is completely free. You can take it unlimited times, view your full results, and share them with friends at no cost."
            }
        },
        {
            "@type": "Question",
            "name": "Can I share my NPC Test results?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes! After completing the test, you can share your results on X (Twitter), Facebook, or copy a direct link. The shareable result includes your RPG role, NPC-to-Boss meter score, and personality traits."
            }
        }
    ]
}
</script>

<!-- App Loader CSS -->
<style>
#app-loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;display:flex;align-items:center;justify-content:center;z-index:10000;transition:opacity .4s}

<body>
<!-- App Loader -->
<div id="app-loader"><div class="loader-emoji">&#x1F3AE;</div></div>

<!-- Scanline overlay -->
<div class="scanlines" aria-hidden="true"></div>

<!-- Skip Link -->
<a href="#main-content" class="skip-link" data-i18n="a11y.skipLink">본문으로 건너뛰기</a>

<!-- Theme Toggle -->
<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
  <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="5" fill="currentColor"/><g stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></g></svg>
  <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor"/></svg>
</button>

<!-- Language Selector -->
<div class="lang-selector">
  <select id="langSelect" aria-label="Language">
    <option value="ko">한국어</option>
    <option value="en">English</option>
    <option value="ja">日本語</option>
    <option value="es">Español</option>
    <option value="pt">Português</option>
    <option value="zh">中文</option>
    <option value="id">Indonesia</option>
    <option value="tr">Türkçe</option>
    <option value="de">Deutsch</option>
    <option value="fr">Français</option>
    <option value="hi">हिन्दी</option>
    <option value="ru">Русский</option>
  </select>
</div>

<main id="main-content">
  <!-- Intro Screen -->
  <section id="intro" class="screen active">
    <div class="rpg-box intro-card">
      <div class="rpg-box-inner">
        <div class="npc-sprite" aria-hidden="true">
          <svg viewBox="0 0 96 96" width="96" height="96">
            <!-- Pixel NPC head -->
            <rect x="28" y="4" width="40" height="8" fill="var(--primary)" opacity="0.9"/>
            <rect x="20" y="12" width="56" height="8" fill="var(--primary)" opacity="0.8"/>
            <rect x="20" y="20" width="8" height="8" fill="var(--primary-dark)"/>
            <rect x="36" y="20" width="8" height="8" fill="#fff" opacity="0.9"/>
            <rect x="52" y="20" width="8" height="8" fill="#fff" opacity="0.9"/>
            <rect x="68" y="20" width="8" height="8" fill="var(--primary-dark)"/>
            <rect x="20" y="28" width="56" height="8" fill="var(--primary)" opacity="0.7"/>
            <rect x="32" y="32" width="32" height="4" fill="var(--primary-dark)" opacity="0.5"/>
            <!-- Body -->
            <rect x="24" y="40" width="48" height="8" fill="var(--primary)" opacity="0.8"/>
            <rect x="24" y="48" width="48" height="16" fill="var(--primary)" opacity="0.6"/>
            <!-- Legs -->
            <rect x="24" y="64" width="20" height="12" fill="var(--primary)" opacity="0.5"/>
            <rect x="52" y="64" width="20" height="12" fill="var(--primary)" opacity="0.5"/>
            <!-- Question mark -->
            <text x="48" y="0" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--primary-light)" style="animation:questionPulse 1.5s ease-in-out infinite">?</text>
          </svg>
        </div>
        <h1 data-i18n="intro.title">NPC 테스트</h1>
        <p class="subtitle" data-i18n="intro.subtitle">RPG 대화 트리로 알아보는 나의 역할</p>
        <button id="startBtn" class="btn-primary" data-i18n="intro.start">퀘스트 시작</button>
        <p class="question-count" data-i18n="intro.questionCount">10개 장면 / 약 3분</p>
      </div>
    </div>
  </section>

  <!-- Dialogue Screen -->
  <section id="dialogue" class="screen">
    <div class="rpg-box dialogue-card">
      <div class="scene-counter">
        <span id="sceneLabel">SCENE 1/10</span>
        <div class="scene-progress-bar">
          <div class="scene-progress-fill" id="sceneProgressFill" style="width:0%"></div>
        </div>
      </div>
      <div class="dialogue-top">
        <div class="npc-portrait">
          <span class="npc-portrait-emoji" id="npcEmoji">&#x1F9D9;</span>
          <span class="npc-name-tag" id="npcNameTag">NPC</span>
        </div>
        <div class="dialogue-text-area">
          <div class="dialogue-text" id="dialogueText"></div>
        </div>
      </div>
      <div class="npc-reaction" id="npcReaction">
        <div class="npc-reaction-text" id="npcReactionText"></div>
      </div>
      <div class="choices-area" id="choicesArea">
        <div id="choicesContainer"></div>
      </div>
      <div class="continue-prompt" id="continuePrompt" data-i18n="dialogue.continue">[ 계속하려면 클릭 ]</div>
    </div>
  </section>

  <!-- Result Screen -->
  <section id="result" class="screen">
    <div class="rpg-box result-card">
      <div class="rpg-box-inner">
        <div class="result-character">
          <div class="result-portrait" id="resultPortrait"></div>
          <h2 class="result-tier-name" id="resultTierName"></h2>
          <p class="result-tagline" id="resultTagline"></p>
        </div>
        <div class="npc-meter">
          <div class="meter-labels">
            <span class="meter-label-left" data-i18n="result.npcLabel">NPC</span>
            <span class="meter-label-right" data-i18n="result.bossLabel">BOSS</span>
          </div>
          <div class="meter-track">
            <div class="meter-fill" id="meterFill"></div>
          </div>
          <div class="meter-score" id="meterScore">0%</div>
        </div>
        <div class="result-description" id="resultDescription"></div>
        <div class="result-traits" id="resultTraits"></div>
        <p class="percentile-stat" id="percentile-stat"></p>
        <div class="result-actions">
          <button id="shareBtn" class="btn-primary" data-i18n="result.share">결과 공유하기</button>
          <button id="retryBtn" class="btn-secondary" data-i18n="result.retry">다시 플레이</button>
        </div>
        <div class="related-tests">
          <h3 data-i18n="result.moreTests">More Tests</h3>
          <div class="related-grid">
            <a href="/brainrot-score/" class="related-card" style="--card-color: #e74c3c">
              <span class="related-emoji">&#x1F9E0;&#x1F480;</span>
              <span class="related-name" data-i18n="related.brainrotScore">Brainrot Score</span>
            </a>
            <a href="/rizz-score/" class="related-card" style="--card-color: #f39c12">
              <span class="related-emoji">&#x1F60E;</span>
              <span class="related-name" data-i18n="related.rizzScore">Rizz Score</span>
            </a>
            <a href="/delulu-score/" class="related-card" style="--card-color: #9b59b6">
              <span class="related-emoji">&#x1F4AD;</span>
              <span class="related-name" data-i18n="related.deluluScore">Delulu Score</span>
            </a>
            <a href="/villain-type/" class="related-card" style="--card-color: #2c3e50">
              <span class="related-emoji">&#x1F9B9;</span>
              <span class="related-name" data-i18n="related.villainType">Villain Type</span>
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Cross-promo container -->
    <div id="cross-promo-container"></div>
  </section>
</main>

<!-- Social Share Modal -->
<div class="share-modal" id="shareModal">
  <div class="share-modal-content rpg-box">
    <div class="rpg-box-inner">
      <button class="share-close" id="shareClose">&times;</button>
      <h3 data-i18n="share.title">결과 공유하기</h3>
      <div class="share-buttons">
        <button class="share-btn share-twitter" id="shareTwitter">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          <span>X</span>
        </button>
        <button class="share-btn share-facebook" id="shareFacebook">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          <span>Facebook</span>
        </button>
        <button class="share-btn share-copy" id="shareCopy">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          <span data-i18n="share.copy">링크 복사</span>
        </button>
      </div>
    </div>
  </div>
</div>
